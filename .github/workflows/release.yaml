name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: prd1
    steps:
      - name: Login to AB Internal Registry
        uses: docker/login-action@v4
        with:
          registry: https://${{ vars.AB_INT_REGISTRY_HOST }}
          username: ${{ vars.AB_INT_REGISTRY_USER }}
          password: ${{ secrets.AB_INT_REGISTRY_PASS }}

      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v4

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          push: true
          tags: |
            registry1.abiddiscombe.dev/web:latest
